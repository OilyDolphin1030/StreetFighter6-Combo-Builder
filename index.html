<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SF6 コンボアイコン作成ツール</title>
  <style>
    :root{
      --bg:#101116; --panel:#1b1e27; --panel2:#222634; --line:#353a48;
      --text:#f5f7fb; --muted:#aeb5c3; --accent:#4e9cff; --green:#36b37e;
      --danger:#ff5d5d; --orange:#ffb347; --purple:#9b7bff;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    header{max-width:980px;margin:auto;padding:16px 12px 6px}
    h1{font-size:20px;margin:0 0 6px}
    p{margin:0;color:var(--muted);font-size:13px}
    main{max-width:980px;margin:auto;padding:10px 12px 28px;display:grid;gap:12px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,.action{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:10px;padding:8px 11px;font-weight:800;cursor:pointer;font-size:13px}
    button:hover{filter:brightness(1.12);border-color:var(--accent)}
    .primary{background:#15579e;border-color:#367fd1}
    .save{background:#12643f;border-color:#279668}
    .copy{background:#5a3fb0;border-color:#8068e8}
    .share{background:#174f5a;border-color:#36a5b8}
    .danger{background:#703030;border-color:#b34b4b}
    .nav{background:#26344f;border-color:#4674ba}
    .nav.active{background:#0f5eaa;border-color:#62a9ff}
    .utility{background:#5b4a1b;border-color:#ad8730}
    .screen{display:none}
    .screen.active{display:grid;gap:12px}
    .hidden{display:none!important}
    .meta{display:grid;grid-template-columns:auto minmax(130px,180px) auto minmax(140px,1fr) auto;gap:8px;align-items:center}
    label{font-size:13px;color:var(--muted);font-weight:800}
    select,input,textarea{width:100%;background:#11131a;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px}
    textarea{min-height:58px;resize:vertical}
    .input-area{display:flex;gap:12px;align-items:flex-start;min-width:0}
    .arrow-wrap{flex:0 0 min(38vw,190px);min-width:0}
    .attack-wrap{flex:1;min-width:0}
    .side-tools{flex:0 0 70px;display:grid;gap:6px;margin-top:25px;min-width:0}
    .group-title{font-size:14px;font-weight:900;color:var(--muted);margin:0 0 8px}
    .arrow-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .attack-pad{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
    .icon-button{height:clamp(54px,8.2vw,72px);padding:3px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#272b38;min-width:0;overflow:hidden}
    .attack-button.punch{background:linear-gradient(180deg,#243a66,#252936);border-color:#5b88df}
    .attack-button.kick{background:linear-gradient(180deg,#5a3325,#252936);border-color:#df8d4b}
    .attack-button.system{background:linear-gradient(180deg,#33384b,#252936);border-color:#60677e}
    .attack-pad > *, .arrow-pad > *, .side-tools > *{min-width:0}
    .icon-button img{width:clamp(28px,4.7vw,42px);height:clamp(28px,4.7vw,42px);object-fit:contain;max-width:100%}
    .icon-button span{font-size:10px;color:var(--muted);line-height:1;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .attack-button .btn-label{font-size:12px;color:#fff;background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:2px 6px;font-weight:900;line-height:1;letter-spacing:.02em}
    .icon-button strong{font-size:clamp(15px,3.8vw,24px);line-height:.95;white-space:pre-line;max-width:100%;overflow:hidden;text-align:center}
    .tc-button strong{font-size:clamp(13px,3.2vw,20px);letter-spacing:-.03em}
    .tool-button{height:54px;background:#313547;padding:5px}
    .tool-button strong{font-size:16px}
    .tool-button span{font-size:10px;color:var(--muted);display:block}
    .output{min-height:78px;border:2px dashed #5b6277;border-radius:14px;background:#0b0c10;padding:10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;align-content:flex-start;overflow:visible}
    .output img{width:24px;height:24px;object-fit:contain;flex:0 0 auto}
    .mini-output img{width:26px;height:26px;object-fit:contain;flex:0 0 auto}
    .out-chip{width:24px;min-width:24px;max-width:24px;height:24px;border-radius:999px;background:#303443;border:1px solid #626a80;display:inline-flex!important;align-items:center;justify-content:center;font-weight:900;font-size:10px;flex:0 0 24px!important;white-space:pre-line;text-align:center;line-height:1.05;overflow:hidden}.out-chip.wide-chip{width:40px;min-width:40px;max-width:40px;flex-basis:40px!important;font-size:9px}
    .mini-output .out-chip{width:26px;min-width:26px;max-width:26px;height:26px;flex-basis:26px!important;font-size:10px}.mini-output .out-chip.wide-chip{width:42px;min-width:42px;max-width:42px;flex-basis:42px!important;font-size:9px}
    .separator{width:16px!important;min-width:16px!important;max-width:16px!important;flex-basis:16px!important;background:transparent;border:0;font-size:18px;overflow:visible}
    .mini-output .separator{width:16px!important;min-width:16px!important;max-width:16px!important;flex-basis:16px!important;font-size:18px}
    .newline{flex-basis:100%;height:0}
    .charged{padding:2px;border-radius:8px;background:linear-gradient(135deg,#fff176,#ffb300,#f57c00);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
    .charged img{display:block}
    .empty{color:#7f8797;font-size:14px}
    .hint{font-size:12px;color:var(--muted);margin-top:8px}
    .paste-grid{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
    .saved-list{display:grid;gap:10px}
    .combo-card{background:#151821;border:1px solid var(--line);border-radius:12px;padding:10px;display:grid;gap:8px}
    .combo-head{display:flex;justify-content:space-between;gap:8px;align-items:center}
    .combo-title{font-weight:900}
    .combo-actions{display:flex;gap:6px;flex-wrap:wrap}
    .combo-actions button{min-width:40px}
    .mini-output{display:flex;flex-wrap:wrap;gap:5px;align-items:center;background:#0c0d12;border-radius:10px;padding:8px;min-height:50px}
    @media(max-width:680px){
      header{padding-top:14px}main{padding:8px 10px 24px}.meta{grid-template-columns:42px 1fr}.meta button{grid-column:1/-1}.input-area{gap:8px}.arrow-wrap{flex:0 0 32%}.side-tools{flex:0 0 56px}.attack-pad{grid-template-columns:repeat(4,minmax(0,1fr));gap:5px}.arrow-pad{gap:5px}.icon-button{height:56px;padding:2px}.icon-button strong{font-size:clamp(13px,4.2vw,20px)}.tc-button strong{font-size:clamp(12px,3.7vw,17px)}.tool-button{height:44px;padding:4px}.paste-grid{grid-template-columns:1fr}.toolbar button{padding:8px 10px}
    }
  </style>
</head>
<body>
<header>
  <h1>SF6 コンボアイコン作成ツール</h1>
  <p>アイコン入力・テキスト貼り付け・保存済みコンボの並び替えができます。</p>
</header>
<main>
  <section class="panel toolbar">
    <button class="nav active" id="showCreate">作成画面</button>
    <button class="nav" id="showSaved">保存コンボ確認</button>
    <button class="utility create-only" id="undoBtn">1つ戻す</button>
    <button class="danger create-only" id="clearBtn">全部消す</button>
    <button class="copy create-only" id="copyTextBtn">並びをコピー</button>
    <button class="copy create-only" id="copyImageBtn">画像としてコピー</button>
  </section>

  <section class="screen active" id="createScreen">
    <section class="panel meta">
      <label>キャラ</label>
      <select id="character"></select>
      <label>コンボ名</label>
      <input id="comboName" placeholder="例: 小技始動 / 確反">
      <button class="save" id="saveBtn">コンボ保存</button>
    </section>

    <section class="panel">
      <div class="input-area">
        <div class="arrow-wrap">
          <div class="group-title">矢印</div>
          <div class="arrow-pad" id="arrowPad"></div>
        </div>
        <div class="attack-wrap">
          <div class="group-title">攻撃</div>
          <div class="attack-pad" id="attackPad"></div>
        </div>
        <div class="side-tools" id="sideTools"></div>
      </div>
    </section>

    <section class="panel">
      <h2 style="font-size:15px;margin:0 0 9px">出力スペース</h2>
      <div class="output" id="output"><span class="empty">ここにアイコンが表示されます</span></div>
      <div class="hint" id="status">選択中: なし</div>
    </section>

    <section class="panel">
      <div class="group-title">並びテキストから画像化</div>
      <div class="paste-grid">
        <textarea id="pasteText" placeholder="例: 下 弱P 弱P > 右下 下 右 中P&#10;※「並びをコピー」でコピーしたテキストを貼り付けできます"></textarea>
        <button class="primary" id="pasteBuildBtn">貼り付け内容を画像化</button>
      </div>
    </section>
  </section>

  <section class="screen" id="savedScreen">
    <section class="panel">
      <div class="toolbar" style="justify-content:space-between">
        <strong>保存済みコンボ</strong>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <label>表示キャラ</label>
          <select id="filterCharacter" style="min-width:150px"></select>
        </div>
      </div>
      <div class="toolbar" style="margin-top:10px">
        <button class="share" id="exportCombosBtn">共有ファイルを書き出し</button>
        <button class="primary" id="importCombosBtn">共有ファイルを読み込み</button>
        <input class="hidden" id="importCombosFile" type="file" accept="application/json,.json">
      </div>
      <div class="hint">↑↓でコンボの並び替え、削除ボタンで不要なコンボを消せます。共有ファイルを書き出すと、友人の環境で読み込めます。</div>
    </section>
    <section class="saved-list" id="savedList"></section>
  </section>
</main>
<script>
(() => {
  const ASSET = 'assets/';
  const CHARACTERS = [
    'リュウ','ルーク','ジェイミー','春麗','ガイル','キンバリー','ジュリ','ケン','ブランカ','ダルシム',
    'エドモンド本田','ディージェイ','マノン','マリーザ','JP','ザンギエフ','リリー','キャミィ',
    'ラシード','A.K.I.','エド','豪鬼','ベガ','テリー','舞','エレナ','サガット',
    'C.ヴァイパー','アレックス','イングリッド','その他'
  ];
  const arrows = [
    {label:'左上',file:'icon_8.png'}, {label:'上',file:'icon_1.png'}, {label:'右上',file:'icon_5.png'},
    {label:'左',file:'icon_7.png'}, {label:'N',file:'icon_18.png'}, {label:'右',file:'icon_6.png'},
    {label:'左下',file:'icon_4.png'}, {label:'下',file:'icon_2.png'}, {label:'右下',file:'icon_3.png'}
  ];
  const attacks = [
    {label:'弱P',file:'icon_11.png'}, {label:'中P',file:'icon_10.png'}, {label:'強P',file:'icon_9.png'}, {label:'P',file:'icon_15.png'},
    {label:'弱K',file:'icon_14.png'}, {label:'中K',file:'icon_13.png'}, {label:'強K',file:'icon_12.png'}, {label:'K',file:'icon_16.png'},
    {label:'DP',text:'DP'}, {label:'DI',text:'DI'}, {label:'TC',text:'TC\n→'}, {label:'>',text:'>',separator:true}
  ];
  const tools = [
    {label:'改行',text:'↵',tool:'newline'},
    {label:'タメ',text:'タメ',tool:'charge'},
    {label:'Delay',text:'Delay',tool:'delay'}
  ];
  const allItems = [...arrows, ...attacks];
  const byLabel = Object.fromEntries(allItems.map(x => [x.label, x]));

  const el = id => document.getElementById(id);
  const createScreen = el('createScreen');
  const savedScreen = el('savedScreen');
  const showCreate = el('showCreate');
  const showSaved = el('showSaved');
  const character = el('character');
  const filterCharacter = el('filterCharacter');
  const comboName = el('comboName');
  const arrowPad = el('arrowPad');
  const attackPad = el('attackPad');
  const sideTools = el('sideTools');
  const output = el('output');
  const status = el('status');
  const savedList = el('savedList');
  const pasteText = el('pasteText');
  const exportCombosBtn = el('exportCombosBtn');
  const importCombosBtn = el('importCombosBtn');
  const importCombosFile = el('importCombosFile');

  let selected = [];
  const KEY = 'sf6_saved_combos_v2';

  function initCharacters(){
    character.innerHTML = CHARACTERS.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    filterCharacter.innerHTML = '<option value="__all">全キャラ</option>' + CHARACTERS.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  }

  function cloneItem(item){ return JSON.parse(JSON.stringify(item)); }
  function isArrow(item){ return arrows.some(a => a.label === item.label); }
  function getSaved(){
    try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
    catch(e){ return []; }
  }
  function setSaved(list){ localStorage.setItem(KEY, JSON.stringify(list)); }

  function buildShareData(){
    return {
      app: 'SF6ComboBuilder',
      version: 1,
      exportedAt: new Date().toISOString(),
      combos: getSaved()
    };
  }

  function normalizeImportedItem(item){
    if(!item || typeof item !== 'object') return null;
    const out = {};
    ['type','label','file','text'].forEach(k => {
      if(typeof item[k] === 'string') out[k] = item[k];
    });
    if(item.separator === true) out.separator = true;
    if(item.charged === true) out.charged = true;
    if(!out.label && !out.text && !out.file && out.type !== 'newline') return null;
    return out;
  }

  function normalizeImportedCombos(data){
    const raw = Array.isArray(data) ? data : (data && Array.isArray(data.combos) ? data.combos : []);
    const now = Date.now();
    return raw.map((combo, idx) => {
      if(!combo || typeof combo !== 'object') return null;
      const items = Array.isArray(combo.items) ? combo.items.map(normalizeImportedItem).filter(Boolean) : [];
      if(!items.length) return null;
      return {
        id: now + idx,
        character: String(combo.character || 'その他'),
        name: String(combo.name || '名称なし'),
        items
      };
    }).filter(Boolean);
  }

  function exportCombos(){
    const list = getSaved();
    if(!list.length){
      alert('書き出す保存済みコンボがありません。');
      return;
    }
    const text = JSON.stringify(buildShareData(), null, 2);
    const blob = new Blob([text], {type:'application/json'});
    const a = document.createElement('a');
    const d = new Date();
    const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    a.href = URL.createObjectURL(blob);
    a.download = `sf6_combo_list_${ymd}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  function importCombosFromFile(file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(String(reader.result || ''));
        const imported = normalizeImportedCombos(data);
        if(!imported.length){
          alert('読み込めるコンボが見つかりませんでした。');
          return;
        }
        const ok = confirm(`${imported.length}件のコンボを現在の保存済みに追加します。よろしいですか？`);
        if(!ok) return;
        setSaved([...getSaved(), ...imported]);
        renderSaved();
        alert('共有コンボを読み込みました。');
      }catch(e){
        alert('共有ファイルの読み込みに失敗しました。JSONファイルか確認してください。');
      }finally{
        importCombosFile.value = '';
      }
    };
    reader.readAsText(file);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function makeBtn(item){
    const b = document.createElement('button');
    b.type = 'button';
    const punchLabels = ['弱P','中P','強P','P'];
    const kickLabels = ['弱K','中K','強K','K'];
    const systemLabels = ['DP','DI','TC','>'];
    const extraClass = punchLabels.includes(item.label) ? ' attack-button punch'
      : kickLabels.includes(item.label) ? ' attack-button kick'
      : systemLabels.includes(item.label) ? ' attack-button system'
      : '';
    b.className = 'icon-button' + extraClass + (item.label === 'TC' ? ' tc-button' : '');
    b.title = item.label;
    const labelClass = extraClass ? 'btn-label' : '';
    if(item.file){
      b.innerHTML = `<img src="${ASSET}${item.file}" alt="${escapeHtml(item.label)}"><span class="${labelClass}">${escapeHtml(item.label)}</span>`;
    }else{
      b.innerHTML = `<strong>${escapeHtml(item.text)}</strong><span class="${labelClass}">${escapeHtml(item.label)}</span>`;
    }
    b.addEventListener('click', () => addItem(cloneItem(item)));
    return b;
  }

  function makeToolBtn(t){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'tool-button';
    b.innerHTML = `<strong>${escapeHtml(t.text)}</strong><span>${escapeHtml(t.label)}</span>`;
    b.addEventListener('click', () => runTool(t.tool));
    return b;
  }

  function initButtons(){
    arrowPad.innerHTML = '';
    attackPad.innerHTML = '';
    sideTools.innerHTML = '';
    arrows.forEach(i => arrowPad.appendChild(makeBtn(i)));
    attacks.forEach(i => attackPad.appendChild(makeBtn(i)));
    tools.forEach(i => sideTools.appendChild(makeToolBtn(i)));
  }

  function labelFor(i){
    if(i.type === 'newline') return '改行';
    if(i.charged) return 'タメ' + i.label;
    return i.label;
  }

  function appendVisual(parent, item){
    if(item.type === 'newline'){
      const br = document.createElement('div');
      br.className = 'newline';
      parent.appendChild(br);
      return;
    }
    if(item.file){
      const img = document.createElement('img');
      img.src = ASSET + item.file;
      img.alt = item.label;
      img.title = item.label;
      if(item.charged){
        const wrap = document.createElement('div');
        wrap.className = 'charged';
        wrap.appendChild(img);
        parent.appendChild(wrap);
      }else{
        parent.appendChild(img);
      }
      return;
    }
    const chip = document.createElement('div');
    chip.className = item.separator ? 'out-chip separator' : ('out-chip' + ((item.label === 'Delay' || String(item.text || '').length > 3) ? ' wide-chip' : ''));
    chip.textContent = item.text || item.label;
    chip.title = item.label;
    parent.appendChild(chip);
  }

  function render(){
    output.innerHTML = '';
    if(!selected.length){
      output.innerHTML = '<span class="empty">ここにアイコンが表示されます</span>';
    }else{
      selected.forEach(i => appendVisual(output, i));
    }
    renderStatus();
  }

  function renderStatus(){
    status.textContent = selected.length ? '選択中: ' + selected.map(labelFor).join(' ') : '選択中: なし';
  }

  function addItem(item){ selected.push(item); render(); }

  function runTool(tool){
    if(tool === 'newline'){
      selected.push({type:'newline', label:'改行'});
      render();
      return;
    }
    if(tool === 'delay'){
      selected.push({label:'Delay', text:'Delay'});
      render();
      return;
    }
    if(tool === 'charge'){
      for(let i = selected.length - 1; i >= 0; i--){
        if(isArrow(selected[i])){
          selected[i].charged = true;
          render();
          return;
        }
      }
      selected.push({label:'タメ', text:'タメ'});
      render();
    }
  }

  function parseText(text){
    const normalized = text.replace(/\r/g, '').replace(/\n/g, ' 改行 ');
    const tokens = normalized.split(/\s+/).filter(Boolean);
    const result = [];
    for(const raw of tokens){
      let token = raw.trim();
      if(!token) continue;
      if(token === '改行' || token === '↵'){
        result.push({type:'newline', label:'改行'});
        continue;
      }
      if(token === 'タメ'){
        result.push({label:'タメ', text:'タメ'});
        continue;
      }
      if(token.startsWith('タメ') && byLabel[token.slice(2)]){
        const it = cloneItem(byLabel[token.slice(2)]);
        it.charged = true;
        result.push(it);
        continue;
      }
      if(token === 'TC→') token = 'TC';
      if(token === 'ディレイ') token = 'Delay';
      if(byLabel[token]){
        result.push(cloneItem(byLabel[token]));
      }else{
        result.push({label:token, text:token});
      }
    }
    return result;
  }

  function renderMini(parent, items){
    parent.innerHTML = '';
    if(!items || !items.length){
      parent.textContent = '空';
      return;
    }
    items.forEach(i => appendVisual(parent, i));
  }

  function renderSaved(){
    const list = getSaved();
    const filter = filterCharacter.value || '__all';
    savedList.innerHTML = '';
    const visibleIndexes = list
      .map((combo, idx) => ({combo, idx}))
      .filter(x => filter === '__all' || x.combo.character === filter)
      .map(x => x.idx);

    if(!visibleIndexes.length){
      savedList.innerHTML = '<section class="panel"><span class="empty">保存済みコンボはありません</span></section>';
      return;
    }

    visibleIndexes.forEach((idx, visiblePos) => {
      const combo = list[idx];
      const card = document.createElement('div');
      card.className = 'combo-card';

      const head = document.createElement('div');
      head.className = 'combo-head';
      head.innerHTML = `<div><div class="combo-title">${escapeHtml(combo.character || '未設定')} / ${escapeHtml(combo.name || '名称なし')}</div></div>`;

      const acts = document.createElement('div');
      acts.className = 'combo-actions';
      if(visiblePos > 0){
        const up = document.createElement('button');
        up.textContent = '↑';
        up.title = '上へ移動';
        up.addEventListener('click', () => moveVisible(idx, -1));
        acts.appendChild(up);
      }
      if(visiblePos < visibleIndexes.length - 1){
        const down = document.createElement('button');
        down.textContent = '↓';
        down.title = '下へ移動';
        down.addEventListener('click', () => moveVisible(idx, 1));
        acts.appendChild(down);
      }
      const del = document.createElement('button');
      del.textContent = '削除';
      del.className = 'danger';
      del.title = 'このコンボを削除';
      del.addEventListener('click', () => deleteCombo(idx));
      acts.appendChild(del);
      head.appendChild(acts);

      const mini = document.createElement('div');
      mini.className = 'mini-output';
      renderMini(mini, combo.items || []);

      card.appendChild(head);
      card.appendChild(mini);
      savedList.appendChild(card);
    });
  }

  function deleteCombo(idx){
    const list = getSaved();
    const combo = list[idx];
    if(!combo) return;
    const ok = confirm(`「${combo.character || '未設定'} / ${combo.name || '名称なし'}」を削除しますか？`);
    if(!ok) return;
    list.splice(idx, 1);
    setSaved(list);
    renderSaved();
  }

  function moveVisible(idx, direction){
    const list = getSaved();
    const filter = filterCharacter.value || '__all';
    const visibleIndexes = list
      .map((combo, i) => ({combo, i}))
      .filter(x => filter === '__all' || x.combo.character === filter)
      .map(x => x.i);
    const pos = visibleIndexes.indexOf(idx);
    const targetIdx = visibleIndexes[pos + direction];
    if(pos === -1 || targetIdx === undefined) return;
    [list[idx], list[targetIdx]] = [list[targetIdx], list[idx]];
    setSaved(list);
    renderSaved();
  }

  function show(which){
    const isCreate = which === 'create';
    createScreen.classList.toggle('active', isCreate);
    savedScreen.classList.toggle('active', !isCreate);
    showCreate.classList.toggle('active', isCreate);
    showSaved.classList.toggle('active', !isCreate);
    document.querySelectorAll('.create-only').forEach(btn => btn.classList.toggle('hidden', !isCreate));
    if(!isCreate) renderSaved();
  }

  function round(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function loadImg(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function drawItemsToCanvas(items){
    const size = 30;
    const gap = 5;
    const pad = 6;
    const maxContentWidth = 760;

    function itemWidth(item){
      if(item.separator) return 18;
      const txt = String(item.text || item.label || '');
      if(item.file) return size;
      if(item.label === 'Delay' || txt.length > 3) return Math.min(54, Math.max(size, txt.length * 7 + 12));
      return size;
    }

    const rows = [[]];
    for(const item of items){
      if(item.type === 'newline'){
        if(rows[rows.length - 1].length) rows.push([]);
        continue;
      }
      const w = itemWidth(item);
      const current = rows[rows.length - 1];
      const currentWidth = current.reduce((sum, e, idx) => sum + e.w + (idx ? gap : 0), 0);
      if(current.length && currentWidth + gap + w > maxContentWidth){
        rows.push([]);
      }
      rows[rows.length - 1].push({ item, w });
    }
    while(rows.length > 1 && rows[rows.length - 1].length === 0) rows.pop();

    const rowWidths = rows.map(row => row.reduce((sum, e, idx) => sum + e.w + (idx ? gap : 0), 0));
    const contentW = Math.max(1, ...rowWidths);
    const w = Math.ceil(pad * 2 + contentW);
    const h = Math.ceil(pad * 2 + rows.length * size + (rows.length - 1) * gap);
    const canvas = document.createElement('canvas');
    const scale = 2;
    canvas.width = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.fillStyle = '#2c3040';
    ctx.fillRect(0, 0, w, h);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for(let r = 0; r < rows.length; r++){
      let x = pad;
      const y = pad + r * (size + gap);
      for(const entry of rows[r]){
        const item = entry.item;
        const chipW = entry.w;
        if(item.file){
          if(item.charged){
            const g = ctx.createLinearGradient(x, y, x + size, y + size);
            g.addColorStop(0, '#fff176');
            g.addColorStop(.55, '#ffb300');
            g.addColorStop(1, '#f57c00');
            ctx.fillStyle = g;
            round(ctx, x, y, size, size, 8);
            ctx.fill();
          }
          const img = await loadImg(ASSET + item.file);
          ctx.drawImage(img, x + 3, y + 3, size - 6, size - 6);
        }else{
          ctx.fillStyle = item.separator ? '#2c3040' : '#303443';
          ctx.strokeStyle = item.separator ? '#2c3040' : '#626a80';
          round(ctx, x, y, chipW, size, item.separator ? 0 : 999);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#f5f7fb';
          ctx.font = item.separator ? '900 22px system-ui' : (item.label === 'Delay' ? '900 10px system-ui' : '900 12px system-ui');
          const lines = String(item.text || item.label).split('\n');
          lines.forEach((line, idx) => ctx.fillText(line, x + chipW / 2, y + size / 2 + (idx - (lines.length - 1) / 2) * 12));
        }
        x += chipW + gap;
      }
    }
    return canvas;
  }

  el('undoBtn').addEventListener('click', () => { selected.pop(); render(); });
  el('clearBtn').addEventListener('click', () => { selected = []; render(); });
  el('copyTextBtn').addEventListener('click', async () => {
    const t = selected.map(labelFor).join(' ');
    try{
      await navigator.clipboard.writeText(t);
      status.textContent = t ? 'コピーしました: ' + t : 'コピーするアイコンがありません';
    }catch(e){
      status.textContent = 'コピーに失敗しました。ブラウザ設定を確認してください。';
    }
  });
  el('copyImageBtn').addEventListener('click', async () => {
    if(!selected.length){ status.textContent = '画像化するアイコンがありません'; return; }
    try{
      const canvas = await drawItemsToCanvas(selected);
      canvas.toBlob(async blob => {
        try{
          await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
          status.textContent = '画像をコピーしました';
        }catch(e){
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'sf6_combo.png';
          a.click();
          status.textContent = '画像コピー非対応のためPNGを保存しました';
        }
      }, 'image/png');
    }catch(e){
      status.textContent = '画像作成に失敗しました';
    }
  });
  el('pasteBuildBtn').addEventListener('click', () => {
    selected = parseText(pasteText.value);
    render();
  });
  el('saveBtn').addEventListener('click', () => {
    if(!selected.length){ status.textContent = '保存するコンボがありません'; return; }
    const list = getSaved();
    list.push({ id: Date.now(), character: character.value, name: comboName.value || '名称なし', items: selected.map(cloneItem) });
    setSaved(list);
    status.textContent = '保存しました';
    renderSaved();
  });
  exportCombosBtn.addEventListener('click', exportCombos);
  importCombosBtn.addEventListener('click', () => importCombosFile.click());
  importCombosFile.addEventListener('change', () => importCombosFromFile(importCombosFile.files && importCombosFile.files[0]));
  filterCharacter.addEventListener('change', renderSaved);
  showCreate.addEventListener('click', () => show('create'));
  showSaved.addEventListener('click', () => show('saved'));

  initCharacters();
  initButtons();
  render();
  renderSaved();
  show('create');
})();
</script>
</body>
</html>
